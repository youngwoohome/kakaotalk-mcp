<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KakaoTalk Auto Mac</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="workspace-grid">
      <section class="panel compose-panel">
        <div class="panel-header">
          <h2>선택된 채팅방 / 보낼 내용</h2>
          <div class="table-caption">선택한 방을 확인하고 바로 발송</div>
        </div>

        <div class="selected-room-box">
          <div class="panel-header panel-header-tight">
            <h3>선택된 채팅방</h3>
            <button id="sync-selected-btn" class="ghost tiny">선택한 채팅방 반영</button>
          </div>
          <div id="selected-room-list" class="selected-room-list"></div>
        </div>

        <form id="send-form" class="form-grid send-form-simple">
          <label class="field field-wide">
            <span>채팅방 이름</span>
            <textarea id="room-name" rows="5" placeholder="한 줄에 하나씩 입력"></textarea>
          </label>

          <label class="field field-wide">
            <span>메시지</span>
            <textarea id="send-message" rows="5" placeholder="발송할 메시지를 입력"></textarea>
          </label>

          <label class="field field-wide">
            <span>파일 경로</span>
            <input id="file-path" type="text" placeholder="첨부 파일 경로">
          </label>

          <label class="field compact-switch">
            <span>파일 먼저 발송</span>
            <input id="file-first" type="checkbox" checked>
          </label>
        </form>

        <div class="action-strip action-strip-primary">
          <button id="pick-file-btn" class="ghost">파일 선택</button>
          <button id="send-btn" type="button" class="primary">발송</button>
        </div>
      </section>

      <section class="panel room-panel">
        <div class="panel-header">
          <h2>카카오톡 채팅방 목록</h2>
          <div class="panel-actions">
            <button id="load-chat-list-btn" class="ghost">채팅방 불러오기</button>
            <button id="load-more-chat-btn" class="ghost">20개 더 불러오기</button>
          </div>
        </div>
        <div class="room-panel-meta">
          <div id="chat-list-caption" class="table-caption">메인 채팅 목록 상단 일부를 빠르게 읽어서 표시</div>
          <label class="filter-toggle">
            <input id="recent-only-toggle" type="checkbox">
            <span>최근 30일 이내만 보기</span>
          </label>
        </div>
        <div class="table-wrap">
          <table class="room-table">
            <thead>
              <tr>
                <th>선택</th>
                <th>채팅방</th>
                <th>최근 활동</th>
              </tr>
            </thead>
            <tbody id="chat-list-body"></tbody>
          </table>
        </div>
      </section>
    </main>

      <section class="panel table-panel">
        <div class="panel-header">
          <div class="history-tabs" role="tablist" aria-label="하단 패널">
            <button id="history-tab-btn" class="tab-button active" type="button" role="tab" aria-selected="true">발송 이력</button>
            <button id="logs-tab-btn" class="tab-button" type="button" role="tab" aria-selected="false">실행 로그</button>
          </div>
          <div class="panel-actions" id="history-actions">
            <button id="clear-history-btn" class="ghost">이력 비우기</button>
          </div>
        </div>
        <div id="history-tab-panel" class="tab-panel active" role="tabpanel">
          <div class="table-wrap">
            <table class="history-table">
              <thead>
                <tr>
                  <th>시각</th>
                  <th>결과</th>
                  <th>방</th>
                  <th>메시지</th>
                  <th>파일</th>
                </tr>
              </thead>
              <tbody id="history-body"></tbody>
            </table>
          </div>
        </div>
        <div id="logs-tab-panel" class="tab-panel" role="tabpanel" hidden>
          <div class="history-log-box">
            <div id="log-list" class="log-list"></div>
          </div>
        </div>
      </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
